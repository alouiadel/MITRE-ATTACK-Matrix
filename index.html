<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MITRE ATT&CK — Financial Sector</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>MITRE ATT&CK — Financial Sector</h1>
        <div class="view-toggle">
          <button id="viewGraphBtn" class="view-btn active">Graph</button>
          <button id="viewMatrixBtn" class="view-btn">Matrix</button>
        </div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <span class="icon-light">&#9788;</span>
          <span class="icon-dark">&#9790;</span>
        </button>
      </div>
      <p>
        Financially-relevant adversary techniques, scored and color-coded by
        prevalence
      </p>
      <div class="stats">
        <span>Layer: <strong>top13(all of them)</strong></span>
        <span>ATT&CK v12</span>
        <span id="totalCount">0 techniques</span>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search techniques by name or ID..."
          autocomplete="off"
        />
      </div>
    </header>

    <div class="graph-wrapper view-graph">
      <div class="graph-container" id="graphContainer">
        <div class="loading">
          <div class="spinner"></div>
          Loading knowledge graph...
        </div>
      </div>
      <div class="graph-controls">
        <button class="graph-reset-btn" id="resetLayoutBtn">
          Reset layout
        </button>
        <div class="graph-legend" id="graphLegend"></div>
      </div>
    </div>

    <div
      class="graph-wrapper view-matrix"
      id="matrixWrapper"
      style="display: none"
    >
      <div class="matrix-container" id="matrixContainer">
        <div class="loading">
          <div class="spinner"></div>
          Loading matrix...
        </div>
      </div>
    </div>

    <div class="graph-tooltip" id="graphTooltip"></div>

    <footer>
      Forked from
      <a href="https://github.com/ichrakamani/MITRE-ATTACK"
        >ichrakamani/MITRE-ATTACK</a
      >
    </footer>

    <div class="modal-overlay" id="modal">
      <div class="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <div class="modal-tech-id" id="modalId"></div>
        <h2 id="modalName"></h2>
        <div class="modal-meta">
          <span class="tactic-label" id="modalTactic"></span>
          <span class="score-badge" id="modalScore"></span>
        </div>
        <p class="modal-description" id="modalDesc"></p>
        <div class="links">
          <a id="modalLink" href="#" target="_blank" rel="noopener"
            >View on MITRE ATT&CK &rarr;</a
          >
        </div>
      </div>
    </div>

    <script src="js/d3.v7.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
